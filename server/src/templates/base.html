<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8" />
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: 'Times New Roman', serif; font-size: 13px; color: #111; padding: 28px 36px; }
    h1 { text-align: center; font-size: 18px; margin-bottom: 4px; text-transform: uppercase; }
    .subtitle { text-align: center; font-size: 13px; margin-bottom: 20px; font-style: italic; }
    .header-org { text-align: center; font-weight: bold; margin-bottom: 2px; font-size: 13px; }
    table.info { width: 100%; border-collapse: collapse; margin-bottom: 14px; }
    table.info td { padding: 4px 6px; vertical-align: top; }
    table.info td:first-child { font-weight: bold; width: 38%; }
    table.data { width: 100%; border-collapse: collapse; margin-bottom: 14px; }
    table.data th, table.data td { border: 1px solid #555; padding: 5px 8px; text-align: left; }
    table.data th { background: #eee; text-align: center; }
    table.data td.right { text-align: right; }
    .section-title { font-weight: bold; margin: 12px 0 6px; font-size: 14px; border-bottom: 1px solid #aaa; padding-bottom: 2px; }
    .sig-row { display: flex; justify-content: space-between; margin-top: 32px; }
    .sig-box { text-align: center; width: 45%; }
    .sig-box .sig-name { font-weight: bold; margin-top: 4px; }
    .sig-box .sig-line { margin-top: 56px; border-top: 1px solid #333; }
    .total-row td { font-weight: bold; font-size: 14px; }
    .note { font-style: italic; font-size: 12px; color: #555; margin-top: 8px; }
    p { margin-bottom: 6px; }
    .date-line { text-align: right; margin-bottom: 20px; font-style: italic; }
  </style>
</head>
<body>
  {{CONTENT}}
</body>
</html>
